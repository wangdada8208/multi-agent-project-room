name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agent_room_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 10); do
            pg_isready -h localhost -U postgres && break
            sleep 2
          done

      - name: Run migrations
        env:
          MAPR_DATABASE_URL: postgresql+asyncpg://postgres:test_password@localhost:5432/agent_room_test
          PYTHONPATH: backend
        run: |
          python3 -m alembic upgrade head

      - name: Run tests
        env:
          MAPR_DATABASE_URL: postgresql+asyncpg://postgres:test_password@localhost:5432/agent_room_test
          PYTHONPATH: backend
        run: |
          python3 -m pytest backend/tests/ -v

  deploy:
    needs: test
    runs-on: [self-hosted, multi-agent]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 部署到服务器
        run: |
          cd /opt/multi-agent-project-room
          git pull origin main
          docker compose up -d --build backend frontend
          docker compose exec -T backend python3 -m alembic -c /app/alembic.ini upgrade head
          docker compose exec -T postgres psql -U postgres -d agent_room \
            -c "ALTER TABLE messages DROP CONSTRAINT IF EXISTS messages_sender_id_fkey;" 2>/dev/null || true
          docker compose exec -T postgres psql -U postgres -d agent_room \
            -c "UPDATE rooms SET is_active = FALSE WHERE id LIKE '_agent_%';" 2>/dev/null || true
          echo "Deploy complete"
